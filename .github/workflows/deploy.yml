name: Deploy to AWS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  TERRAFORM_VERSION: 1.6.0

jobs:
  # Job 1: Terraform Infrastructure
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    environment: Produccion
    
    outputs:
      backend_ip: ${{ steps.terraform_output.outputs.backend_ip }}
      frontend_bucket: ${{ steps.terraform_output.outputs.frontend_bucket }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false
      
      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init
      
      - name: Terraform Plan
        working-directory: ./terraform
        run: terraform plan -out=tfplan
      
      - name: Terraform Apply
        working-directory: ./terraform
        run: terraform apply -auto-approve tfplan
      
      - name: Get Terraform Outputs
        id: terraform_output
        working-directory: ./terraform
        run: |
          echo "backend_ip=$(terraform output -raw backend_ip)" >> $GITHUB_OUTPUT
          echo "frontend_bucket=$(terraform output -raw frontend_bucket)" >> $GITHUB_OUTPUT

  # Job 2: Build & Deploy Backend
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: terraform
    environment: Produccion
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Create deployment package
        run: |
          cd backend
          tar -czf ../backend-deploy.tar.gz .
          cd ../scraping
          tar -czf ../scraping-deploy.tar.gz data/
      
      - name: Upload to S3
        run: |
          aws s3 cp backend-deploy.tar.gz s3://futfactos-deployments/backend/
          aws s3 cp scraping-deploy.tar.gz s3://futfactos-deployments/scraping/
      
      - name: Deploy to EC2
        env:
          BACKEND_IP: ${{ needs.terraform.outputs.backend_ip }}
        run: |
          # Crear script de deploy
          cat > deploy.sh <<'EOF'
          #!/bin/bash
          set -e
          
          # Download from S3
          aws s3 cp s3://futfactos-deployments/backend/backend-deploy.tar.gz /tmp/
          aws s3 cp s3://futfactos-deployments/scraping/scraping-deploy.tar.gz /tmp/
          
          # Extract
          sudo mkdir -p /opt/futfactos
          cd /opt/futfactos
          sudo tar -xzf /tmp/backend-deploy.tar.gz -C backend/ || sudo mkdir -p backend && sudo tar -xzf /tmp/backend-deploy.tar.gz -C backend/
          sudo tar -xzf /tmp/scraping-deploy.tar.gz -C scraping/ || sudo mkdir -p scraping && sudo tar -xzf /tmp/scraping-deploy.tar.gz -C scraping/
          
          # Setup Python venv
          cd backend
          python3 -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt
          
          # Restart service
          sudo systemctl restart futfactos-backend || sudo systemctl start futfactos-backend
          sudo systemctl enable futfactos-backend
          
          echo "Backend deployed successfully"
          EOF
          
          # TODO: Ejecutar en EC2 via SSM o SSH
          echo "Deploy script created. Manual deployment needed for first time."
          echo "Run: ssh -i key.pem ubuntu@${BACKEND_IP} 'bash -s' < deploy.sh"

  # Job 3: Build & Deploy Frontend
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: terraform
    environment: Produccion
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      
      - name: Build frontend
        working-directory: ./frontend
        env:
          VITE_API_URL: http://${{ needs.terraform.outputs.backend_ip }}:8000
        run: |
          echo "VITE_API_URL=http://${{ needs.terraform.outputs.backend_ip }}:8000/api/v1" > .env.production
          npm run build
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Deploy to S3
        working-directory: ./frontend
        run: |
          aws s3 sync dist/ s3://${{ needs.terraform.outputs.frontend_bucket }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "*.json"
          
          # HTML files with short cache
          aws s3 sync dist/ s3://${{ needs.terraform.outputs.frontend_bucket }}/ \
            --exclude "*" \
            --include "*.html" \
            --include "*.json" \
            --cache-control "public, max-age=0, must-revalidate"
      
      - name: Deployment Summary
        run: |
          echo "## 🚀 Deployment Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend URL**: http://${{ needs.terraform.outputs.frontend_bucket }}.s3-website-${{ env.AWS_REGION }}.amazonaws.com" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend IP**: ${{ needs.terraform.outputs.backend_ip }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend API**: http://${{ needs.terraform.outputs.backend_ip }}:8000" >> $GITHUB_STEP_SUMMARY
